<!DOCTYPE html>
<html>
<body style="text-align:center; background:pink; font-family:Arial;">

<h2>💖 Question 3</h2>
<p>What do I love most about you?</p>

<form method="post" onsubmit="return checkAnswer()">

<input type="radio" name="q3" value="a"> Your smile 😍<br>
<input type="radio" name="q3" value="b"> Your attitude 😏<br>
<input type="radio" name="q3" value="c"> Everything… no doubt 💖<br><br>

<button type="submit">Next ➡️</button>

</form>

<script>
function checkAnswer() {
    let answer = document.querySelector('input[name="q3"]:checked');

    if (!answer) {
        alert("Select an answer first 😏");
        return false;
    }

    // ✅ Correct Answer = c
    if (answer.value === "c") {
        alert("Awww 😍 correct! Chellamey");
        return true; // go to next page
    }

    // ❌ Funny wrong answers
    if (answer.value === "a") {
        alert("Ayyoo over confidence ah 😎😂 try again!");
        return false;
    }

    if (answer.value === "b") {
        alert("Secret ah? 😜 caught you 😂 wrong answer!");
        return false;
    }
}
</script>

</body>
</html>
