<!DOCTYPE html>
<html>
<body style="text-align:center; background:pink; font-family:Arial;">

<h2>💖 Question 5</h2>
<p>Who sleeps first while chatting?</p>

<form method="post" onsubmit="return checkAnswer()">

<input type="radio" name="q5" value="a"> Me 😴<br>
<input type="radio" name="q5" value="b"> You 😴<br>
<input type="radio" name="q5" value="c"> Both say “I’m not sleepy” and disappear<br><br>

<button type="submit">Next ➡️</button>

</form>

<script>
function checkAnswer() {
    let answer = document.querySelector('input[name="q5"]:checked');

    if (!answer) {
        alert("Select an answer first 😏");
        return false;
    }

    // ✅ Correct Answer = a
    if (answer.value === "a") {
        alert("Ipovachu unmaiya othukittiye");
        return true; // go to next page
    }

    // ❌ Funny wrong answers
    if (answer.value === "c") {
        alert("Ayyoo over confidence ah 😎😂 try again!");
        return false;
    }

    if (answer.value === "b") {
        alert("Secret ah? 😜 caught you 😂 wrong answer!");
        return false;
    }
}
</script>

</body>
</html>
